<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overlay Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #181a20;
      color: #e0e6f0;
      font-family: 'Bebas Neue', Arial, sans-serif;
      /* Subtle grid background */
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .dashboard-container {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-start;
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
      padding: 40px 60px;
    }
    .manual-alerts {
      background: rgba(30,32,40,0.85);
      border-radius: 18px;
      box-shadow: 0 2px 16px 0 #000a;
      padding: 32px 24px;
      min-width: 320px;
      max-width: 340px;
      margin-right: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .manual-alerts h2 {
      font-size: 2.1rem;
      font-weight: 700;
      margin: 0 0 12px 0;
      color: #aab6ff;
      letter-spacing: 1.5px;
    }
    .alert-toggle {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 1.3rem;
      background: #23243a;
      border-radius: 10px;
      padding: 12px 18px;
      cursor: pointer;
      transition: background 0.2s;
      border: 2px solid #23243a;
    }
    .alert-toggle.active {
      background: #3a3d5c;
      border-color: #6c7aff;
      color: #aab6ff;
    }
    .alert-toggle img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      filter: drop-shadow(0 0 4px #6c7aff88);
    }
    .alerts-panel {
      flex: 1 1 auto;
      background: rgba(30,32,40,0.85);
      border-radius: 18px;
      box-shadow: 0 2px 16px 0 #000a;
      padding: 32px 24px;
      min-width: 400px;
      margin-left: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 600px;
    }
    .alerts-panel h2 {
      font-size: 2.1rem;
      font-weight: 700;
      margin: 0 0 12px 0;
      color: #aab6ff;
      letter-spacing: 1.5px;
    }
    .alert-item {
      background: #23243a;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 10px;
      color: #fff;
      font-size: 1.1rem;
      border-left: 5px solid #6c7aff;
      box-shadow: 0 1px 4px #0004;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .alert-item.critical {
      border-left-color: #ff4e6c;
      background: #2a1a22;
    }
    .alert-item.warning {
      border-left-color: #ffd36c;
      background: #2a241a;
      color: #ffe6a0;
    }
    .alert-item.info {
      border-left-color: #6c7aff;
    }
    @media (max-width: 900px) {
      .dashboard-container {
        flex-direction: column;
        align-items: stretch;
        padding: 20px 4vw;
      }
      .manual-alerts, .alerts-panel {
        margin: 0 0 24px 0;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <div class="manual-alerts">
      <h2>Manual Alerts</h2>
      <div class="alert-toggle" onclick="toggleAlert(this, 'alert1')">
        <img src="alert1.png" alt="Alert 1" />
        Alert 1
      </div>
      <div class="alert-toggle" onclick="toggleAlert(this, 'alert2')">
        <img src="alert2.png" alt="Alert 2" />
        Alert 2
      </div>
      <div class="alert-toggle" onclick="toggleAlert(this, 'alert3')">
        <img src="alert3.png" alt="Alert 3" />
        Alert 3
      </div>
      <!-- Add more toggles as needed -->
    </div>
    <div class="alerts-panel">
      <h2>Active Alerts</h2>
      <div id="alerts-list">
        <!-- Alerts will be dynamically inserted here -->
      </div>
    </div>
  </div>
  <script>
    // Example: Manual alert toggles (show/hide PNG overlays for OBS)
    function toggleAlert(element, alertId) {
      element.classList.toggle('active');
      // Show/hide PNG overlay logic for OBS browser source
      const overlayId = 'overlay-' + alertId;
      let overlay = document.getElementById(overlayId);
      if (!overlay) {
        overlay = document.createElement('img');
        overlay.id = overlayId;
        overlay.src = alertId + '.png';
        overlay.style.position = 'fixed';
        overlay.style.top = '50%';
        overlay.style.left = '50%';
        overlay.style.transform = 'translate(-50%, -50%)';
        overlay.style.zIndex = '9999';
        overlay.style.pointerEvents = 'none';
        overlay.style.maxWidth = '60vw';
        overlay.style.maxHeight = '60vh';
        document.body.appendChild(overlay);
      } else {
        overlay.remove();
      }
    }
    // Example: Populate active alerts (replace with your logic)
    const alerts = [
      { type: 'critical', text: 'Tornado Warning: County A until 5:30 PM' },
      { type: 'warning', text: 'Severe Thunderstorm: County B until 6:00 PM' },
      { type: 'info', text: 'Flood Advisory: County C until 7:00 PM' }
    ];
    const alertsList = document.getElementById('alerts-list');
    alerts.forEach(alert => {
      const div = document.createElement('div');
      div.className = 'alert-item ' + alert.type;
      div.textContent = alert.text;
      alertsList.appendChild(div);
    });
  </script>
</body>
</html>
