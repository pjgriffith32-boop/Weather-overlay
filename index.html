<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Alert System</title>
  <style>
    /* Use local Franklin Gothic Medium Condensed font if available */
    @font-face {
      font-family: "Franklin Gothic Medium Cond";
      src: local("Franklin Gothic Medium Cond"), local("Franklin Gothic Medium");
      font-weight: normal;
      font-style: normal;
    }
    /* Basic Page Styles */
    body {
      margin: 0;
      padding: 0;
      background: rgba(0, 0, 0, 0);
      font-family: "Franklin Gothic Medium Cond", "Franklin Gothic Medium", Arial, sans-serif;
      background-size: cover;
      /* No transition here */
    }
    /* Display Elements for Alert Texts */
    #event-text {
      position: fixed;
      top: 95%;
      left: -28.7%;
      color: white;
      font-size: 2rem;
      font-weight: bold;
      font-family: "Franklin Gothic Medium Cond", "Franklin Gothic Medium", Arial, sans-serif;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
      opacity: 1;
      transition: opacity 1s ease-in-out;
      z-index: 10001;
      text-transform: uppercase;
    }
    #area-text {
      position: fixed;
      top: 95%;
      left: 26.3%;
      color: white;
      font-size: 2rem;
      font-weight: bold;
      font-family: "Franklin Gothic Medium Cond", "Franklin Gothic Medium", Arial, sans-serif;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
      opacity: 1;
      transition: opacity 1s ease-in-out;
      z-index: 10001;
      text-transform: uppercase;
    }
    #expire-date-container {
      position: fixed;
      bottom: 6.1%;
      right: 74%;
      background: none;
      width: 330.641px;
      height: 20px;
      padding: 10px;
      border: 0;
      text-align: center;
      box-shadow: 2px 2px 5px rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10001;
    }
    #expire-date {
      color: rgba(0, 0, 0, 0);
      font-size: 1.4rem;
      font-family: "Franklin Gothic Medium Cond", "Franklin Gothic Medium", Arial, sans-serif;
      font-weight: bold;
      text-align: center;
      white-space: nowrap;
    }

    @keyframes alert-light-sweep {
      0% { left: -80%; }
      50% { left: 100%; }
      100% { left: 100%; }
    }
    /* Loading Overlay Styles */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: transparent; /* Changed from black to transparent */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 1s ease;
      opacity: 1;
      pointer-events: all;
    }
    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #loading-overlay img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
    }
    /* Overlay for background fade effect */
    #bg-fade-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      background: rgba(0, 0, 0, 0);
      opacity: 0;
      z-index: 10;
      transition: opacity 1s;
    }
  </style>
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <img src="AlertLoad.gif" alt="Loading..." />
  </div>
  <!-- Background fade overlay -->
  <div id="bg-fade-overlay"></div>
  
  <!-- Display Elements for Alert Texts -->
  <div id="event-text" style="text-align: center; width:83%;"></div>
  <div id="area-text"></div>
  <div id="expire-date-container">
    <div id="expire-date">Expires in: N/A</div>
  </div>
  
  <script>
    // Variables for sequential display
    let currentAlertIndex = 0;
    let currentAreaIndex = 0;
    let selectedBackground = "";

    // Track last displayed alert/area for cycling
    let lastAlertListSignature = "";

    // Global caching to prevent flickering
    let cachedAlerts = [];
    let lastUpdateTime = 0; // Timestamp (in ms) of last valid update

    // Normalize warnverlay API alert to internal format
    function normalizeWarnverlayAlert(alert) {
      const props = alert.properties || {};
      const tags = props.tags || {};
      const eventType = props.event || "Unknown Event";
      const areaDesc = props.areaDesc || "Unknown Area";
      const expireDate = props.expires || "N/A";
      // Assign all possible threat/detection tags from warnverlay
      const tornadoDetection = tags.TORNADO || null;
      const tornadoDamageThreat = tags.TORNADO_DAMAGE_THREAT || null;
      const flashFloodDamageThreat = tags.FLASH_FLOOD_DAMAGE_THREAT || null;
      const thunderstormDamageThreat = tags.THUNDERSTORM_DAMAGE_THREAT || null;
      // Add these flags for background and label logic
      const thunderstormDamageThreatConsiderable = thunderstormDamageThreat === "CONSIDERABLE";
      const thunderstormDamageThreatDestructive  = thunderstormDamageThreat === "DESTRUCTIVE";
      const tornadoDamageThreatCatastrophic      = tornadoDamageThreat === "CATASTROPHIC";
      const tornadoDamageThreatConsiderable      = tornadoDamageThreat === "CONSIDERABLE";
      const areaChunks = splitAreaDesc(areaDesc, 9);
      return {
        eventType,
        areaChunks,
        expireDate,
        tornadoDetection,
        tornadoDamageThreat,
        flashFloodDamageThreat,
        thunderstormDamageThreat,
        thunderstormDamageThreatConsiderable,
        thunderstormDamageThreatDestructive,
        tornadoDamageThreatCatastrophic,
        tornadoDamageThreatConsiderable
      };
    }

    // Fetch alerts from warnverlay API
    async function fetchWarnverlayAlerts() {
      try {
        const response = await fetch('https://warnverlay-usa-warnings.netlify.app/');
        if (!response.ok) throw new Error("Warnverlay API error");
        const data = await response.json();
        if (!Array.isArray(data) || data.length === 0) return [];
        return data.map(normalizeWarnverlayAlert);
      } catch (error) {
        console.warn("Warnverlay API failed:", error);
        return [];
      }
    }

    // Fetch and parse alerts from the Atom API (existing logic)
    async function fetchAtomAlerts() {
      try {
        const response = await fetch('https://api.weather.gov/alerts/active.atom?');
        const text = await response.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(text, "application/xml");
        let entries = [];
        const xpathResult = xmlDoc.evaluate("//*[local-name()='entry']", xmlDoc, null, XPathResult.ORDERED_NODE_SNAPSHOT_TYPE, null);
        for (let i = 0; i < xpathResult.snapshotLength; i++) {
          entries.push(xpathResult.snapshotItem(i));
        }
        function getText(node, tagName) {
          const result = node.ownerDocument.evaluate(
            `.//*[local-name()='${tagName}']`,
            node,
            null,
            XPathResult.STRING_TYPE,
            null
          );
          return result.stringValue.trim();
        }
        const alerts = entries.map(entry => {
          const eventType = getText(entry, "event") || "Unknown Event";
          const areaDesc = getText(entry, "areaDesc") || "Unknown Area";
          const expireDate = getText(entry, "expires") || "N/A";
          let parameterNodes = Array.from(entry.getElementsByTagNameNS("*", "parameter"));
          const tornadoDetection = parameterNodes.find(param => getText(param, "valueName") === "tornadoDetection")
                                    ? getText(parameterNodes.find(param => getText(param, "valueName") === "tornadoDetection"), "value")
                                    : null;
          const flashFloodDamageThreat = parameterNodes.find(param => getText(param, "valueName") === "flashFloodDamageThreat")
                                    ? getText(parameterNodes.find(param => getText(param, "valueName") === "flashFloodDamageThreat"), "value")
                                    : null;
          const tornadoDamageThreat = parameterNodes.find(param => getText(param, "valueName") === "tornadoDamageThreat")
                                    ? getText(parameterNodes.find(param => getText(param, "valueName") === "tornadoDamageThreat"), "value")
                                    : null;
          const thunderstormDamageThreat = parameterNodes.find(param => getText(param, "valueName") === "thunderstormDamageThreat")
                                    ? getText(parameterNodes.find(param => getText(param, "valueName") === "thunderstormDamageThreat"), "value")
                                    : null;
          const thunderstormDamageThreatConsiderable = thunderstormDamageThreat === "CONSIDERABLE";
          const thunderstormDamageThreatDestructive  = thunderstormDamageThreat === "DESTRUCTIVE";
          const tornadoDamageThreatCatastrophic       = tornadoDamageThreat === "CATASTROPHIC";
          const tornadoDamageThreatConsiderable       = tornadoDamageThreat === "CONSIDERABLE";
          const areaChunks = splitAreaDesc(areaDesc, 17);
          return {
            eventType,
            areaChunks,
            expireDate,
            tornadoDetection,
            flashFloodDamageThreat,
            tornadoDamageThreatCatastrophic,
            tornadoDamageThreatConsiderable,
            thunderstormDamageThreatConsiderable,
            thunderstormDamageThreatDestructive
          };
        });
        return alerts.filter(alert => {
          if (alert.expireDate === "N/A") return true;
          return new Date(alert.expireDate).getTime() > Date.now();
        });
      } catch (error) {
        console.error("Error fetching Atom alerts:", error);
        return [];
      }
    }

    // Unified fetch function: try warnverlay, fallback to Atom
    async function fetchWeatherAlerts() {
      let alerts = await fetchWarnverlayAlerts();
      if (!alerts || alerts.length === 0) {
        alerts = await fetchAtomAlerts();
      }
      return alerts;
    }

    // Filtering function:
    // • If any allowed (high‑priority) alerts are active, display only those.
    // • Otherwise, display every active alert (this includes winter and all other advisories).
    function filterAlerts(alerts) {
      // If any tornado, severe thunderstorm, or flash flood warnings are active, only show those
      const tsvf = alerts.filter(alert =>
        alert.eventType.includes("Snow Squall Warning") ||
        alert.eventType.toLowerCase().includes("tornado warning") ||
        alert.eventType.toLowerCase().includes("severe thunderstorm warning") ||
        alert.eventType.toLowerCase().includes("flash flood warning")
      );
      if (tsvf.length > 0) {
        return tsvf;
      }
      // Otherwise, show all high-priority alerts
      const allowedAlerts = alerts.filter(alert =>
        alert.eventType.includes("Hurricane Warning") ||
        alert.eventType.includes("Tropical Storm Warning") ||
        alert.eventType.includes("Storm Surge Warning") ||
        alert.eventType.includes("Storm Surge Watch") ||
        alert.eventType.includes("Hurricane Watch") ||
        alert.eventType.includes("Tropical Storm Watch") ||
        alert.eventType.includes("Tornado Watch") ||
        alert.eventType.includes("Severe Thunderstorm Watch") ||
        alert.eventType.includes("Blizzard Warning") ||
        alert.eventType.includes("Winter Storm Warning") ||
        alert.eventType.includes("Ice Storm Warning")
      );
      if (allowedAlerts.length > 0) {
        return allowedAlerts;
      } else {
        return alerts;
      }
    }
    
    // Split the area description into chunks with a maximum number of words per chunk.
    function splitAreaDesc(areaDesc, maxWords) {
      const parts = areaDesc.split(";");
      const chunks = [];
      let currentChunk = [];
      for (let part of parts) {
        const wordCount = (currentChunk.join(" ") + " " + part).trim().split(/\s+/).length;
        if (wordCount > maxWords && currentChunk.length > 0) {
          chunks.push(currentChunk.join("; "));
          currentChunk = [];
        }
        currentChunk.push(part.trim());
      }
      if (currentChunk.length > 0) {
        chunks.push(currentChunk.join("; "));
      }
      return chunks;
    }
    
    // Calculate minutes until expiration.
    function calculateMinutesUntilExpiration(expireDate) {
      if (expireDate === "N/A") return "N/A";
      const expireTime = new Date(expireDate).getTime();
      const minutesLeft = Math.max(Math.floor((expireTime - Date.now()) / (1000 * 60)), 0);
      return `${minutesLeft} minute(s)`;
    }
    
    // Determine the background image based on strict priority.
    // If no alerts exist, return "No Weather Alerts.png".
    function determineBackground(alerts) {
      if (alerts.length === 0) {
        console.log("No active alerts—returning 'No Weather Alerts.png'");
        return "No Weather Alerts.png";
      }
      if (alerts.some(alert => alert.tornadoDetection === "OBSERVED" && alert.tornadoDamageThreatCatastrophic)) {
        return "TORE.png";
      }
      if (alerts.some(alert =>
          alert.eventType.toLowerCase().includes("pds tornado warning") ||
          ((alert.tornadoDetection === "OBSERVED" || alert.tornadoDetection === "RADAR INDICATED") &&
           alert.tornadoDamageThreatConsiderable)
      )) {
        return "PDS TOR.png";
      }
      if (alerts.some(alert => 
        alert.eventType.toLowerCase().includes("tornado warning") &&
        alert.tornadoDetection === "OBSERVED"
      )) {
        return "OBSERVED TOR.png";
      }
      if (alerts.some(alert => alert.eventType.toLowerCase().includes("tornado warning"))) {
        return "TOR.png";
      }
      if (alerts.some(alert =>
          alert.eventType.toLowerCase().includes("flash flood warning") &&
          alert.flashFloodDamageThreat === "CATASTROPHIC"
      )) {
        return "FFWE.png";
      }
      if (alerts.some(alert =>
          alert.thunderstormDamageThreatDestructive &&
          alert.eventType.toLowerCase().includes("severe thunderstorm warning")
      )) {
        return "PDS SVR.png";
      }
      if (alerts.some(alert => alert.eventType.toLowerCase().includes("severe thunderstorm warning"))) {
        return "SVR.png";
      }
      if (alerts.some(alert => alert.eventType.toLowerCase().includes("hurricane warning"))) {
        return "HUW.png";
      }
      if (alerts.some(alert =>
          alert.eventType.toLowerCase().includes("flash flood warning") &&
          alert.flashFloodDamageThreat === "CONSIDERABLE"
      )) {
        return "FFW - Considerable.png";
      }
      if (alerts.some(alert => alert.eventType.toLowerCase().includes("flash flood warning"))) {
        return "FFW.png";
      }
      if (alerts.some(alert => alert.eventType.toLowerCase().includes("tropical storm warning"))) {
        return "TSW.png";
      }
      if (alerts.some(alert => alert.eventType.toLowerCase().includes("snow squall warning"))) {
        return "SQW.png";
      }
      if (alerts.some(alert => alert.eventType.toLowerCase().includes("tornado watch"))) {
        return "TOA.png";
      }
      if (alerts.some(alert => alert.eventType.toLowerCase().includes("blizzard warning"))) {
        return "BZW.png";
      }
      if (alerts.some(alert => alert.eventType.toLowerCase().includes("winter storm warning"))) {
        return "WSW.png";
      }
      if (alerts.some(alert => alert.eventType.toLowerCase().includes("severe thunderstorm watch"))) {
        return "SVA.png";
      }
      if (alerts.some(alert => alert.eventType.toLowerCase().includes("winter storm watch"))) {
        return "WSA.png";
      }
      if (alerts.some(alert =>
          alert.eventType.toLowerCase().includes("special weather statement") ||
          alert.eventType.toLowerCase().includes("sws")
      )) {
        return "SWS.png";
      }
      return "AlertActive.png";
    }
    
    // Update the page background if it has changed.
    function updateBackground(image) {
      if (selectedBackground !== image) {
        // Fade in overlay
        const overlay = document.getElementById('bg-fade-overlay');
        overlay.style.opacity = '1';
        setTimeout(() => {
          selectedBackground = image;
          document.body.style.background = `url('${image}') no-repeat center center fixed`;
          document.body.style.backgroundSize = "cover";
          // Fade out overlay
          overlay.style.opacity = '0';
        }, 1000); // Short fade-in before changing background
        console.log("Background updated to:", image);
      }
    }
    
    // Helper to create a signature for the current alert list
    function getAlertListSignature(alerts) {
      return alerts.map(a => `${a.eventType}|${a.areaChunks.join(",")}|${a.expireDate}`).join("||");
    }

    // Display alerts sequentially.
    async function displayAlertsSequentially(alerts, alertIndex, areaIndex) {
      const eventElement = document.getElementById("event-text");
      const areaElement = document.getElementById("area-text");
      const expireDateElement = document.getElementById("expire-date");

      // Filter for tornado warning logic
      let tornadoPresent = alerts.some(alert =>
        alert.eventType.toLowerCase().includes("tornado warning")
      );
      let filteredForTornado = alerts;
      if (tornadoPresent) {
        filteredForTornado = alerts.filter(alert =>
          alert.eventType.toLowerCase().includes("tornado warning") ||
          alert.eventType.toLowerCase().includes("severe thunderstorm warning") ||
          alert.eventType.toLowerCase().includes("flash flood warning")
        );
      }

      // --- NEW LOGIC: Only show tornado warnings if specific threat detected ---
      const hasSpecialTornadoThreat = filteredForTornado.some(alert =>
        alert.eventType.toLowerCase().includes("tornado warning") &&
        (
          (alert.tornadoDetection === "OBSERVED" &&
            (alert.tornadoDamageThreatCatastrophic || alert.tornadoDamageThreatConsiderable)
          ) ||
          (alert.tornadoDetection === "RADAR INDICATED" &&
            alert.tornadoDamageThreatConsiderable
          )
        )
      );
      if (hasSpecialTornadoThreat) {
        filteredForTornado = filteredForTornado.filter(alert =>
          alert.eventType.toLowerCase().includes("tornado warning")
        );
      }
      // --- END NEW LOGIC ---

      const bgImage = determineBackground(alerts);
      updateBackground(bgImage);

      // If no alerts exist, display a default message.
      if (filteredForTornado.length === 0) {
        eventElement.textContent = "No Active Weather Alerts";
        areaElement.textContent = "";
        expireDateElement.textContent = "";
        return;
      }

      // If using the generic background ("AlertActive.png"), display all active alerts.
      if (bgImage === "AlertActive.png") {
        eventElement.textContent = filteredForTornado.map(a => a.eventType).join(" | ");
        areaElement.textContent = filteredForTornado.map(a => a.areaChunks.join(" | ")).join(" | ");
        expireDateElement.textContent = "";
        return;
      }

      // Otherwise, display detailed information for one high-priority alert.
      const alert = filteredForTornado[alertIndex];
      const currentChunk = alert.areaChunks[areaIndex];
      const minutesLeft = calculateMinutesUntilExpiration(alert.expireDate);

      eventElement.style.opacity = 0;
      areaElement.style.opacity = 0;
      await new Promise(resolve => setTimeout(resolve, 1000));

      if (alert.eventType.toLowerCase().includes("flash flood warning") && alert.flashFloodDamageThreat === "CATASTROPHIC") {
        eventElement.textContent = "Flash Flood Emergency";
      } else if (alert.tornadoDetection === "OBSERVED" && alert.tornadoDamageThreatCatastrophic) {
        eventElement.textContent = "Tornado Emergency";
      } else if (
        alert.eventType.toLowerCase().includes("pds tornado warning") ||
        ((alert.tornadoDetection === "OBSERVED" || alert.tornadoDetection === "RADAR INDICATED") &&
         alert.tornadoDamageThreatConsiderable)
      ) {
        eventElement.textContent = "PDS Tornado Warning";
      } else if (alert.tornadoDetection === "OBSERVED") {
        eventElement.textContent = "Observed Tornado Warning";
      } else {
        eventElement.textContent = alert.eventType;
      }

      if (alert.eventType.toLowerCase().includes("tornado warning") && alert.tornadoDetection === "RADAR INDICATED") {
        areaElement.textContent = `Radar Indicated: ${currentChunk}`;
      } else if (alert.eventType.toLowerCase().includes("severe thunderstorm warning") && alert.thunderstormDamageThreatConsiderable) {
        areaElement.textContent = `Considerable: ${currentChunk}`;
      } else if (alert.eventType.toLowerCase().includes("severe thunderstorm warning") && alert.thunderstormDamageThreatDestructive) {
        areaElement.textContent = `Destructive: ${currentChunk}`;
      } else if (alert.eventType.toLowerCase().includes("flash flood warning") && alert.flashFloodDamageThreat === "CONSIDERABLE") {
        areaElement.textContent = `Considerable: ${currentChunk}`;
      } else {
        areaElement.textContent = currentChunk;
      }

      expireDateElement.textContent = `Expires in: ${minutesLeft}`;
      
      eventElement.style.opacity = 1;
      areaElement.style.opacity = 1;
    }

    // Main update function.
    let weatherUpdateStarted = false;

    async function updateBackgroundCycle(firstRun = false) {
      // Fetch only weather.gov alerts
      let alertsRaw = await fetchWeatherAlerts();
      const filteredAlerts = filterAlerts(alertsRaw);

      // Cache new valid alerts (if any).
      if (filteredAlerts.length > 0) {
        cachedAlerts = filteredAlerts;
        lastUpdateTime = Date.now();
      } else if (cachedAlerts.length > 0 && (Date.now() - lastUpdateTime) < (10 * 60 * 1000)) {
        console.log("Using cached alerts");
      }
      
      const alertsToDisplay = filteredAlerts.length > 0 ? filteredAlerts : cachedAlerts;

      // --- NEW: Reset cycling if alert list changes ---
      const newSignature = getAlertListSignature(alertsToDisplay);
      if (newSignature !== lastAlertListSignature) {
        currentAlertIndex = 0;
        currentAreaIndex = 0;
        lastAlertListSignature = newSignature;
      }

      // --- NEW: Advance indices for cycling ---
      if (alertsToDisplay.length > 0) {
        let alert = alertsToDisplay[currentAlertIndex];
        let areaChunks = alert.areaChunks || [""];
        currentAreaIndex++;
        if (currentAreaIndex >= areaChunks.length) {
          currentAreaIndex = 0;
          currentAlertIndex++;
          if (currentAlertIndex >= alertsToDisplay.length) {
            currentAlertIndex = 0;
          }
        }
      } else {
        currentAlertIndex = 0;
        currentAreaIndex = 0;
      }

      console.log("Active Alerts Count:", alertsToDisplay.length);
      await displayAlertsSequentially(alertsToDisplay, currentAlertIndex, currentAreaIndex);

      // Fade out loading overlay after first PNG background is set
      if (firstRun) {
        const overlay = document.getElementById('loading-overlay');
        overlay.classList.add('fade-out');
        setTimeout(() => {
          overlay.style.display = 'none';
        }, 1000);
      }
    }
    
    function startWeatherAlertUpdates() {
      if (weatherUpdateStarted) return;
      weatherUpdateStarted = true;
      // First run: fade out overlay after PNG is set
      updateBackgroundCycle(true).then(() => {
        setInterval(updateBackgroundCycle, 5000);
      });
    }

    // Start updates after DOM is ready
    window.addEventListener('DOMContentLoaded', () => {
      startWeatherAlertUpdates();
    });
  </script>
</body>
</html>
